name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (macOS arm64)
    runs-on: macos-14
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Show Swift environment
        run: |
          swift --version
          uname -m

      - name: Run tests
        run: swift test

      - name: Build release binary
        run: swift build -c release
